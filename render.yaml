services:
  - type: worker
    name: hyperliquid-paper-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.main
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HL_WS_URL
        value: wss://api.hyperliquid.xyz/ws
      - key: HL_COIN
        value: BTC
      - key: HL_INTERVAL
        value: 1m
      - key: BOT_INITIAL_BALANCE
        value: 10000
      - key: BOT_RISK_PER_TRADE
        value: 0.01
      - key: BOT_DATA_DIR
        value: data
      - key: BOT_LOG_LEVEL
        value: INFO
